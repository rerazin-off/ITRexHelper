{% load static %}
<header class="site-header">
    <div class="site-header__inner">
        <a href="{% url 'admin_dashboard' %}" class="logo">
            <img src="{% static 'img/logo.svg' %}" alt="IT REX HELPER" width="40" height="40">
            <div class="logo__text">
                <div class="logo__title">IT REX</div>
                <div class="logo__subtitle">HELPER</div>
            </div>
        </a>
        <nav class="nav-pills">
            <a href="{% url 'admin_dashboard' %}" class="{% if active_nav == 'dashboard' %}active{% endif %}">Главная</a>
            <a href="{% url 'admin_tickets' %}" class="{% if active_nav == 'tickets' %}active{% endif %}">Заявки</a>
            <a href="{% url 'admin_analytics' %}" class="{% if active_nav == 'analytics' %}active{% endif %}">Аналитика</a>
            <a href="{% url 'admin_chat' %}" class="{% if active_nav == 'chat' %}active{% endif %}">Обращения</a>
            <a href="{% url 'admin_users' %}" class="{% if active_nav == 'users' %}active{% endif %}">Пользователи</a>
        </nav>
        <a href="{% url 'logout' %}" class="profile-btn" title="Выйти">👤</a>
    </div>
</header>
