services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production}
      DJANGO_DB_PATH: /data/db.sqlite3
      DJANGO_STATIC_ROOT: /app/ITRexHelper/staticfiles
      DJANGO_MEDIA_ROOT: /app/ITRexHelper/media
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,web,.ngrok-free.dev,.ngrok.io,uncoddled-miquel-wabbly.ngrok-free.dev}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000,https://uncoddled-miquel-wabbly.ngrok-free.dev}
    volumes:
      - django_data:/data
      - static_volume:/app/ITRexHelper/staticfiles
      - ./media:/app/ITRexHelper/media
    expose:
      - "8090"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8000}:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
      - static_volume:/staticfiles:ro
      - ./media:/media:ro
    depends_on:
      - web

volumes:
  django_data:
  static_volume:
