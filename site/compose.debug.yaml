services:
  web:
    build:
      context: .
      dockerfile: ./Dockerfile
    command:
      [
        "sh",
        "-c",
        "pip install debugpy -t /tmp && python /tmp/debugpy --wait-for-client --listen 0.0.0.0:5678 manage.py runserver 0.0.0.0:8090 --nothreading --noreload",
      ]
    ports:
      - "8000:8090"
      - "5678:5678"
    environment:
      DJANGO_DEBUG: "True"
      DJANGO_DB_PATH: /data/db.sqlite3
      DJANGO_STATIC_ROOT: /app/ITRexHelper/staticfiles
      DJANGO_MEDIA_ROOT: /app/ITRexHelper/media
    volumes:
      - django_data:/data
      - static_volume:/app/ITRexHelper/staticfiles
      - ./media:/app/ITRexHelper/media

volumes:
  django_data:
  static_volume:
